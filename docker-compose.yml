services:

  jekyll:
    image: jekyll/jekyll:latest
    platform: linux/amd64
    command: bash -c "bundle check || bundle install && jekyll serve --watch --force_polling --config '_config.yml,_config_dev.yml'"
    volumes:
      - ./:/app
      - jekyll-cache:/app/.jekyll-cache
      - bundle_cache:/usr/local/bundle
    ports:
      - "4002:4002"
    working_dir: /app
    env_file:
      - .env
    environment:
      JEKYLL_ENV: development
      BUNDLE_PATH: /usr/local/bundle

  quest-validator:
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 /app/test/quest-validator/quest_validator.py
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
      PATH: "/opt/venv/bin:$PATH"

  prd-machine:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./scripts/prd-machine/prd-machine --help
    volumes:
      - ./:/app
      - ./.git:/app/.git

  quest-network-validator:
    build:
      context: .
      dockerfile: Dockerfile
    command: python3 /app/scripts/quest/validate-quest-network.py
    volumes:
      - ./:/app
    working_dir: /app
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: 1
      PATH: "/opt/venv/bin:$PATH"

volumes:
  jekyll-cache:
  bundle_cache:

