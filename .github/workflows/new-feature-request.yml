name: Add new feature request

on:
  issues:
    types: [labeled]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  update_features:
    runs-on: ubuntu-latest
    if: github.event.label.name == 'approved'
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Append feature to markdown file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_URL: https://github.com/${{ github.repository }}/issues/
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          python script/append_feature.py

      - name: Build commit message
        id: commit_msg
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          # Keep the untrusted issue title out of any shell-interpolated
          # context; emit it as a step output the runner passes verbatim.
          {
            echo "message<<EOF"
            echo "Add new feature request: $ISSUE_TITLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          author_name: GitHub Actions
          author_email: actions@github.com
          message: ${{ steps.commit_msg.outputs.message }}