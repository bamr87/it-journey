name: 🏗️ Build Validation & Cross-Platform Testing

on:
  # Run on dependency changes and main branch pushes
  push:
    branches: [ main, master ]
    paths:
      - 'Gemfile'
      - 'Gemfile.lock'
      - '_config*.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pages/**'
      - '_layouts/**'
      - '_includes/**'
      - '_plugins/**'
      - '_sass/**'
      - 'assets/**'

  # Run on PRs that touch build-relevant paths only
  pull_request:
    branches: [ main, master ]
    paths:
      - 'Gemfile'
      - 'Gemfile.lock'
      - '_config*.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pages/**'
      - '_layouts/**'
      - '_includes/**'
      - '_plugins/**'
      - '_sass/**'
      - 'assets/**'

  # Manual trigger
  workflow_dispatch:
    inputs:
      test_docker:
        description: 'Test Docker build'
        required: false
        default: true
        type: boolean
      test_jekyll:
        description: 'Test Jekyll build'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RUBY_VERSION: '3.2'
  NODE_VERSION: '20'

jobs:
  # Cheap gate so the expensive jobs (Docker build, 3-OS cross-platform matrix)
  # only run when their inputs actually changed. A content-only push to main no
  # longer spins up Windows + macOS runners or a ~6-minute Docker build just to
  # re-confirm dependency compatibility that didn't change.
  detect-changes:
    name: 🔎 Detect Changed Inputs
    runs-on: ubuntu-latest
    outputs:
      deps: ${{ steps.filter.outputs.deps }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: 🏰 Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Compute changed file groups
        id: filter
        run: |
          # Manual runs always exercise everything.
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
            echo "docker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] \
             || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            CHANGED=$(git diff --name-only "${HEAD}~1" "${HEAD}" 2>/dev/null || echo "")
          else
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || echo "")
          fi
          echo "Changed files:"; echo "$CHANGED"

          if echo "$CHANGED" | grep -qE '^(Gemfile|Gemfile\.lock)$'; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(Dockerfile|docker-compose\.yml|Gemfile|Gemfile\.lock)$'; then
            echo "docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "docker=false" >> "$GITHUB_OUTPUT"
          fi

  jekyll-build-test:
    name: 🏗️ Jekyll Build Test
    runs-on: ubuntu-latest
    if: github.event.inputs.test_jekyll != 'false'
    # Bound the job: bundle install (cached) + a build already capped at 300s.
    # Without this, a wedged bundle/network step rides the 6h runner default.
    timeout-minutes: 15

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 1

    # Fail FAST (before the slow Ruby build) on Liquid raw-guard bugs — an
    # orphan/nested {% raw %}/{% endraw %} or an unguarded GitHub Actions ${{ }}.
    # These are fatal to every Jekyll build, production Pages included, and take
    # the deploy down. Scoped to CHANGED pages on a PR (so pre-existing debt
    # never blocks an unrelated change); full sweep on push/dispatch.
    # pipefail: `checker | tee` must fail on the CHECKER's exit code, not tee's —
    # without it this gate can never fail in PR mode (the PR #445 escape).
    - name: 🧪 Liquid raw-guard gate
      env:
        BASE: ${{ github.event.pull_request.base.sha }}
      run: |
        set -o pipefail
        python3 scripts/validation/check_liquid_raw.py --selftest
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null || true
          mapfile -t files < <(git diff --name-only "$BASE" HEAD -- 'pages/**/*.md' 'pages/**/*.markdown' 2>/dev/null || true)
          if [ "${#files[@]}" -eq 0 ]; then echo "no changed content pages — skipping." | tee -a "$GITHUB_STEP_SUMMARY"; exit 0; fi
          echo "checking ${#files[@]} changed page(s)…" >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/validation/check_liquid_raw.py "${files[@]}" | tee -a "$GITHUB_STEP_SUMMARY"
        else
          python3 scripts/validation/check_liquid_raw.py pages | tee -a "$GITHUB_STEP_SUMMARY"
        fi

    - name: 🔧 Setup Ruby Environment
      uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
      with:
        ruby-version: ${{ env.RUBY_VERSION }}
        bundler-cache: true

    - name: 📊 Validate Bundle Dependencies
      run: |
        echo "## 💎 Bundle Dependency Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if bundle check; then
          echo "✅ Bundle dependencies satisfied" >> $GITHUB_STEP_SUMMARY
          echo "BUNDLE_STATUS=success" >> $GITHUB_ENV
        else
          echo "❌ Bundle check failed — run bundle install locally" >> $GITHUB_STEP_SUMMARY
          echo "BUNDLE_STATUS=failed" >> $GITHUB_ENV
          exit 1
        fi

    - name: 🔍 Check Configuration Validity
      run: |
        # pipefail: `if cmd | tee` must test cmd's exit code, not tee's.
        set -o pipefail
        echo "## ⚙️ Configuration Validation" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if bundle exec jekyll doctor 2>&1 | tee doctor-output.log; then
          echo "✅ Jekyll configuration valid" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ Jekyll configuration issues detected:" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          cat doctor-output.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🏗️ Test Jekyll Build Process
      id: jekyll_build
      run: |
        # pipefail is load-bearing: GH Actions' default shell (`bash -e {0}`)
        # does NOT set it, so `if jekyll build | tee log` tests tee's exit code
        # (always 0) and a failed build reports ✅. That masking let the PR #445
        # Liquid crash merge and break the production Pages deploy.
        set -o pipefail
        echo "## 🏗️ Jekyll Build Test" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ github.event_name }}" = "pull_request" ]; then
          BUILD_CONFIG="_config.yml,_config_dev.yml,_config_ci.yml"
          BUILD_LABEL="CI smoke (local theme, no preview scan)"
        else
          BUILD_CONFIG="_config.yml"
          BUILD_LABEL="production"
        fi

        echo "Build mode: ${BUILD_LABEL}" >> $GITHUB_STEP_SUMMARY
        echo "Config: ${BUILD_CONFIG}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if timeout 300 bundle exec jekyll build --config "${BUILD_CONFIG}" 2>&1 | tee build-output.log; then
          echo "✅ Jekyll build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "BUILD_STATUS=success" >> $GITHUB_ENV

          if grep -i "warning\|error" build-output.log > warnings.log; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Build completed with warnings:" >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
            head -20 warnings.log >> $GITHUB_STEP_SUMMARY
            echo "```" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -d "_site" ]; then
            SITE_SIZE=$(du -sh _site | cut -f1)
            FILE_COUNT=$(find _site -type f | wc -l)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Build Statistics:**" >> $GITHUB_STEP_SUMMARY
            echo "- Site size: $SITE_SIZE" >> $GITHUB_STEP_SUMMARY
            echo "- Files generated: $FILE_COUNT" >> $GITHUB_STEP_SUMMARY
          fi

        else
          echo "❌ Jekyll build failed!" >> $GITHUB_STEP_SUMMARY
          echo "BUILD_STATUS=failed" >> $GITHUB_ENV
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Error details:**" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          tail -50 build-output.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: 📤 Upload Build Logs
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: jekyll-build-logs
        path: |
          build-output.log
          doctor-output.log
          warnings.log
        retention-days: 7

  docker-build-test:
    name: 🐳 Docker Build Test
    runs-on: ubuntu-latest
    needs: detect-changes
    # Docker build is capped at 600s below; bound the whole job too.
    timeout-minutes: 20
    # Only build the image on manual runs or when Docker/dependency inputs change.
    if: |
      github.event.inputs.test_docker != 'false' &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'push' && needs.detect-changes.outputs.docker == 'true'))

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        fetch-depth: 1

    - name: 🐳 Test Docker Build
      id: docker_build
      run: |
        # pipefail: `if cmd | tee` must test cmd's exit code, not tee's.
        set -o pipefail
        echo "## 🐳 Docker Build Test" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if timeout 600 docker build -t it-journey-test . 2>&1 | tee docker-build.log; then
          echo "✅ Docker build successful" >> $GITHUB_STEP_SUMMARY
          echo "DOCKER_STATUS=success" >> $GITHUB_ENV

          IMAGE_SIZE=$(docker images it-journey-test --format "table {{.Size}}" | tail -n 1)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Docker Image Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Image size: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- Ruby version in container: $(docker run --rm it-journey-test ruby --version)" >> $GITHUB_STEP_SUMMARY

        else
          echo "❌ Docker build failed!" >> $GITHUB_STEP_SUMMARY
          echo "DOCKER_STATUS=failed" >> $GITHUB_ENV
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Error details:**" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          tail -50 docker-build.log >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

    - name: 🧪 Test Container Functionality
      if: env.DOCKER_STATUS == 'success'
      run: |
        echo "## 🧪 Container Functionality Test" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if timeout 30 docker run --rm -d --name test-container -p 4003:4002 it-journey-test; then
          sleep 10
          if docker ps | grep test-container; then
            echo "✅ Container started successfully" >> $GITHUB_STEP_SUMMARY
            docker stop test-container || true
          else
            echo "⚠️ Container failed to start properly" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ Container start test failed" >> $GITHUB_STEP_SUMMARY
        fi

        docker stop test-container 2>/dev/null || true
        docker rm test-container 2>/dev/null || true
        docker rmi it-journey-test || true

    - name: 📤 Upload Docker Build Logs
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: docker-build-logs
        path: docker-build.log
        retention-days: 7

  cross-platform-validation:
    name: 🌐 Cross-Platform Validation
    needs: detect-changes
    # Windows + macOS runners are costly; only verify cross-platform Ruby/Jekyll
    # compatibility when the Gemfile changes or on a manual run.
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && needs.detect-changes.outputs.deps == 'true')
    runs-on: ${{ matrix.os }}
    # Windows bundle installs are the slow leg; bound each matrix job so a
    # wedged install can't hold a costly runner for the 6h default.
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # zer0-mistakes theme >= 1.21 requires Ruby >= 3.2
        ruby-version: ['3.2']

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: 🔧 Setup Ruby Environment
      uses: ruby/setup-ruby@95ef2b042f9d7a56d8268cba8559e2842e2ad01b # v1
      with:
        ruby-version: ${{ matrix.ruby-version }}
        bundler-cache: true

    - name: 📊 Cross-Platform Bundle Test
      shell: bash
      run: |
        echo "Testing on ${{ matrix.os }} with Ruby ${{ matrix.ruby-version }}"
        bundle check
        bundle exec jekyll --version
        bundle exec jekyll doctor 2>&1 || true
        echo "Doctor check completed"

    - name: 📊 Report Platform Results
      run: |
        echo "## 🌐 ${{ matrix.os }} - Ruby ${{ matrix.ruby-version }}" >> $GITHUB_STEP_SUMMARY
        echo "✅ Bundle install and basic Jekyll commands successful" >> $GITHUB_STEP_SUMMARY

  build-summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [jekyll-build-test, docker-build-test, cross-platform-validation]
    if: always()

    steps:
    - name: 📊 Generate Overall Summary
      run: |
        echo "## 🏗️ Build Validation Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.jekyll-build-test.result }}" == "success" ]; then
          echo "✅ **Jekyll Build**: Passed" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.jekyll-build-test.result }}" == "skipped" ]; then
          echo "⏭️ **Jekyll Build**: Skipped" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Jekyll Build**: Failed" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.docker-build-test.result }}" == "success" ]; then
          echo "✅ **Docker Build**: Passed" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.docker-build-test.result }}" == "skipped" ]; then
          echo "⏭️ **Docker Build**: Skipped (PR — runs on push/main only)" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ **Docker Build**: Failed" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.cross-platform-validation.result }}" == "success" ]; then
          echo "✅ **Cross-Platform**: Passed" >> $GITHUB_STEP_SUMMARY
        elif [ "${{ needs.cross-platform-validation.result }}" == "skipped" ]; then
          echo "⏭️ **Cross-Platform**: Skipped (PR — runs on push/main only)" >> $GITHUB_STEP_SUMMARY
        else
          echo "⚠️ **Cross-Platform**: Some issues detected" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY

        if [ "${{ needs.jekyll-build-test.result }}" != "success" ] && [ "${{ needs.jekyll-build-test.result }}" != "skipped" ]; then
          echo "- 🔍 Review Jekyll build logs and fix configuration issues" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.docker-build-test.result }}" == "failed" ]; then
          echo "- 🐳 Review Docker build logs and fix containerization issues" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.cross-platform-validation.result }}" == "failure" ]; then
          echo "- 🌐 Review cross-platform compatibility issues" >> $GITHUB_STEP_SUMMARY
        fi

        if [ "${{ needs.jekyll-build-test.result }}" == "success" ]; then
          echo "- 🎉 Jekyll build passing" >> $GITHUB_STEP_SUMMARY
        fi
