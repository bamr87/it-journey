name: AI Content Review Workflow

on:
  pull_request:
    paths:
      - 'pages/**/*.md'
    types: [opened, synchronize]
  push:
    branches: [main]
    paths:
      - 'pages/**/*.md'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  ai-content-review:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: pip install pyyaml requests

    - name: Get changed markdown files
      id: changed-files
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          changed_files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep -E '^pages/.*\.md$' | head -20)
        else
          changed_files=$(git diff --name-only HEAD~1 HEAD | grep -E '^pages/.*\.md$' | head -20)
        fi

        echo "Changed markdown files:"
        echo "$changed_files"

        echo "files<<EOF" >> $GITHUB_OUTPUT
        echo "$changed_files" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Review content
      id: ai-review
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        AI_PROVIDER: ${{ vars.AI_PROVIDER || 'none' }}
        AI_MODEL: ${{ vars.AI_MODEL || '' }}
        CHANGED_FILES: ${{ steps.changed-files.outputs.files }}
      run: |
        python scripts/validation/content-reviewer.py \
          --output /tmp/ai_review_results.json \
          --summary /tmp/review_summary.md

    - name: Comment on PR (if applicable)
      if: github.event_name == 'pull_request'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -f "/tmp/review_summary.md" ]; then
          jq -n --rawfile body /tmp/review_summary.md '{"body": $body}' | \
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"
        fi

    - name: Create issue (if push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        if [ -f "/tmp/review_summary.md" ]; then
          jq -n --rawfile body /tmp/review_summary.md '{
            "title": "🤖 AI Content Review - Improvement Suggestions",
            "body": $body,
            "labels": ["ai-review", "content-improvement", "automated"]
          }' | \
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.github.com/repos/${{ github.repository }}/issues"
        fi

    - name: Upload review artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ai-review-results
        path: |
          /tmp/ai_review_results.json
          /tmp/review_summary.md
        retention-days: 30