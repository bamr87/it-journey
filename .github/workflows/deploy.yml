name: 🚀 Deploy to GitHub Pages

# Canonical production deploy for it-journey.dev (custom domain via CNAME).
# Replaces the retired weekly gh-pages cron (auto-pr.yml) and the Azure
# workflow. Production publishes from main on every push, gated by the build.
#
# Pages source must be set to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top; the deploy job widens to exactly what Pages needs.
permissions:
  contents: read

# Serialize production deploys; never cancel an in-flight deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  RUBY_VERSION: '3.2'

jobs:
  build:
    name: 🏗️ Build (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build site (production)
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job needs Pages write + the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
