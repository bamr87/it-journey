name: 🚀 Deploy to GitHub Pages

# Canonical production deploy for it-journey.dev (custom domain via CNAME).
# Replaces the retired weekly gh-pages cron (auto-pr.yml) and the Azure
# workflow. Production publishes from main on every push, gated by the build.
#
# Pages source must be set to "GitHub Actions" in repo Settings → Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege at the top; the deploy job widens to exactly what Pages needs.
permissions:
  contents: read

# Serialize production deploys; never cancel an in-flight deploy.
concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  RUBY_VERSION: '3.2'

jobs:
  build:
    name: 🏗️ Build (production)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Ruby
        uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Build site (production)
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build --config _config.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    name: 🚀 Deploy
    needs: build
    runs-on: ubuntu-latest
    # Only the deploy job needs Pages write + the OIDC token.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
