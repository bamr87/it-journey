name: Update Contributor Profiles

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      username:
        description: 'Specific contributor username (leave blank for all)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  update-contributor-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Check for contributor files
        id: check
        run: |
          COUNT=$(find _data/contributors -name "*.yml" ! -name "_*" 2>/dev/null | wc -l | tr -d ' ')
          echo "contributor_count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -eq 0 ]; then
            echo "No contributor files found, skipping."
          else
            echo "Found $COUNT contributor file(s)"
          fi

      - name: Generate contributor stats
        if: steps.check.outputs.contributor_count != '0'
        run: |
          chmod +x scripts/generation/generate_contributor_stats.sh
          if [ -n "${{ github.event.inputs.username }}" ]; then
            bash scripts/generation/generate_contributor_stats.sh --username "${{ github.event.inputs.username }}"
          else
            bash scripts/generation/generate_contributor_stats.sh --all
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet _data/contributors/; then
            echo "changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --stat _data/contributors/
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add _data/contributors/*.yml
          git commit -m "chore(contributors): auto-update contributor stats [skip ci]

          Auto-generated by update-contributor-profiles workflow.
          Triggered by: ${{ github.event_name }}
          Commit: ${{ github.sha }}"
          git push

      - name: Create summary
        run: |
          echo "## Contributor Profile Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changes }}" == "true" ]; then
            echo "🎉 **Contributor stats updated and committed.**" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No changes to contributor stats.**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Contributors processed: ${{ steps.check.outputs.contributor_count }}" >> $GITHUB_STEP_SUMMARY
