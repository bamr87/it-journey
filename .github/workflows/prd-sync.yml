name: 🤖 PRD Machine Sync

# PRD MACHINE v2 - PR-Driven Product Reality Distillery
# Triggers on PR merge: checks if PRD needs updating, then syncs.
# Opens a PR with changes instead of committing directly to main.

on:
  # Trigger when PRs are merged into main
  pull_request:
    types: [closed]
    branches: [main, master]

  # Manual trigger for on-demand sync
  workflow_dispatch:
    inputs:
      days:
        description: 'Days of git history to analyze'
        required: false
        default: '30'
        type: string
      force_sync:
        description: 'Skip quick-check and force sync'
        required: false
        default: false
        type: boolean
      ai_analysis:
        description: 'Enable AI analysis via GitHub Models API'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write
  issues: write
  models: read

jobs:
  # ── Job 1: Quick check ────────────────────────────────────────
  check:
    name: 🔍 Quick Check
    runs-on: ubuntu-latest
    # Only run on merged PRs (not closed-without-merge) or manual dispatch
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true)
    outputs:
      needs_update: ${{ steps.check.outputs.needs_update }}
      check_result: ${{ steps.check.outputs.check_result }}

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🔍 Run Quick Check
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "## 🤖 PRD Machine - Quick Check" >> $GITHUB_STEP_SUMMARY

        # Force sync skips check
        if [ "${{ github.event.inputs.force_sync }}" = "true" ]; then
          echo "needs_update=true" >> $GITHUB_OUTPUT
          echo '{"needs_update": true, "reason": "Forced sync via workflow_dispatch"}' > check-result.json
          echo "check_result=forced" >> $GITHUB_OUTPUT
          echo "⚡ **Force sync** requested — skipping check" >> $GITHUB_STEP_SUMMARY
          exit 0
        fi

        # Build check flags
        CHECK_FLAGS=""
        if [ "${{ github.event.inputs.ai_analysis }}" = "true" ]; then
          CHECK_FLAGS="--ai"
        fi

        # Pass PR event JSON if available
        if [ -n "$GITHUB_EVENT_PATH" ] && [ -f "$GITHUB_EVENT_PATH" ]; then
          CHECK_FLAGS="$CHECK_FLAGS --pr-json $GITHUB_EVENT_PATH"
        fi

        # Run check (exit 0 = no update, exit 1 = update needed)
        set +e
        python3 scripts/prd-machine/prd-machine.py check $CHECK_FLAGS 2>&1 | tee check-output.log
        CHECK_EXIT=$?
        set -e

        # Extract JSON result (last JSON block in output)
        CHECK_JSON=$(grep -A 100 '^{' check-output.log | head -20)
        echo "$CHECK_JSON" > check-result.json

        if [ $CHECK_EXIT -eq 1 ]; then
          echo "needs_update=true" >> $GITHUB_OUTPUT
          echo "✅ Update recommended" >> $GITHUB_STEP_SUMMARY
        else
          echo "needs_update=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No update needed" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```json' >> $GITHUB_STEP_SUMMARY
        cat check-result.json >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: 📤 Upload Check Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prd-check-results
        path: |
          check-output.log
          check-result.json
        retention-days: 7

  # ── Job 2: Sync + open PR ─────────────────────────────────────
  sync:
    name: 🔄 Sync PRD.md
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.needs_update == 'true'

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🔄 Run PRD Machine Sync
      id: sync
      run: |
        DAYS="${{ github.event.inputs.days || '30' }}"

        echo "## 🤖 PRD Machine - Sync" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

        python3 scripts/prd-machine/prd-machine.py sync --days "$DAYS" 2>&1 | tee sync-output.log
        cat sync-output.log >> $GITHUB_STEP_SUMMARY

        echo '```' >> $GITHUB_STEP_SUMMARY

        # Check if PRD actually changed
        if git diff --quiet PRD.md 2>/dev/null; then
          echo "prd_changed=false" >> $GITHUB_OUTPUT
          echo "ℹ️ No meaningful changes after sync" >> $GITHUB_STEP_SUMMARY
        else
          echo "prd_changed=true" >> $GITHUB_OUTPUT
          echo "✅ PRD.md updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```diff' >> $GITHUB_STEP_SUMMARY
          git diff PRD.md | head -80 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        fi

    - name: 🔀 Create Pull Request
      if: steps.sync.outputs.prd_changed == 'true'
      uses: peter-evans/create-pull-request@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "chore(prd): auto-sync PRD.md"
        branch: prd-machine/auto-sync
        delete-branch: true
        title: "🤖 PRD Machine: Update PRD.md"
        body: |
          ## 🤖 PRD Machine Auto-Sync

          Dynamic sections in PRD.md have been updated based on recent repository changes.

          **Trigger:** ${{ github.event_name == 'pull_request' && format('PR #{0} merged', github.event.pull_request.number) || 'Manual dispatch' }}

          ### What changed
          Only marker-delimited sections (`<!-- AUTO:BEGIN -->` / `<!-- AUTO:END -->`) were updated:
          - `metadata` — frontmatter timestamps and version
          - `status_line` — version badge
          - `mvp_status` — content counts (quests, posts, features, commits)
          - `edge_issues` — recently detected requirement issues

          Human-authored sections (WHY, UX, API, NFR, OOS, ROAD, RISK, DONE) are **untouched**.

          ---
          *Generated by PRD Machine v2 — [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*
        labels: |
          prd-machine
          automated

    - name: 📤 Upload Sync Logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: prd-sync-logs
        path: sync-output.log
        retention-days: 7

  # ── Job 3: Conflict detection ──────────────────────────────────
  check-conflicts:
    name: 🔍 Check Conflicts
    runs-on: ubuntu-latest
    needs: sync
    if: always() && needs.check.outputs.needs_update == 'true'

    steps:
    - name: 🏰 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🐍 Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 🔍 Detect Conflicts
      id: conflicts
      run: |
        echo "## 🔍 Conflict Detection" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        python3 scripts/prd-machine/prd-machine.py conflicts 2>&1 | tee conflicts-output.log

        if grep -q "Found\|Detected.*conflicts\|potential conflicts" conflicts-output.log; then
          echo "conflicts_found=true" >> $GITHUB_OUTPUT
          echo "⚠️ **Conflicts detected** — review required" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat conflicts-output.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "conflicts_found=false" >> $GITHUB_OUTPUT
          echo "✅ No conflicts detected" >> $GITHUB_STEP_SUMMARY
        fi

    - name: ⚠️ Create Issue for Conflicts
      if: steps.conflicts.outputs.conflicts_found == 'true'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const conflicts = fs.readFileSync('conflicts-output.log', 'utf8');

          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '⚠️ PRD Machine: Requirement Conflicts Detected',
            body: `## Conflict Detection Report

          The PRD Machine has detected potential conflicts in requirements that need human review.

          ### Detected Conflicts

          \`\`\`
          ${conflicts}
          \`\`\`

          ### Next Steps

          1. Review the conflicts listed above
          2. Determine the correct resolution
          3. Update the relevant source files
          4. Run \`prd-machine sync\` to regenerate the PRD

          ---
          *Generated by PRD Machine v2 — [Workflow Run](${context.payload.repository.html_url}/actions/runs/${context.runId})*`,
            labels: ['prd-machine', 'requires-review', 'automated']
          });
