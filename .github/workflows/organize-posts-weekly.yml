---
name: 'Weekly Post Organization and Archiving'

on:
  schedule:
    # Run every Sunday at 2 AM UTC (weekly)
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode (preview changes only)'
        required: false
        default: false
        type: boolean
      archive_threshold_months:
        description: 'Archive posts older than this many months'
        required: false
        default: '3'
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  organize-posts:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Setup Python Environment'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 'Install Python Dependencies'
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: 'Configure Git'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action - Post Organizer"

      - name: 'Check Script Permissions'
        run: |
          chmod +x scripts/development/content/organize-posts.sh
          ls -la scripts/development/content/organize-posts.sh

      - name: 'Run Post Organization (Dry Run Preview)'
        id: dry_run
        run: |
          echo "🔍 Running dry-run to preview changes..."
          ./scripts/development/content/organize-posts.sh --dry-run --auto-confirm 2>&1 | tee dry_run_output.log
          
          # Extract summary for PR description
          echo "DRY_RUN_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat dry_run_output.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 'Identify Posts for Archiving (3+ months old)'
        id: archive_check
        env:
          ARCHIVE_THRESHOLD_MONTHS: ${{ github.event.inputs.archive_threshold_months || '3' }}
        run: |
          echo "📅 Identifying posts older than ${ARCHIVE_THRESHOLD_MONTHS} months..."

          # Calculate cutoff date (3 months ago)
          cutoff_date=$(date -d "${ARCHIVE_THRESHOLD_MONTHS} months ago" +%Y-%m-%d)
          echo "Cutoff date: $cutoff_date"
          
          # Find posts older than cutoff date
          old_posts=()
          archive_candidates=""
          
          for file in pages/_posts/*.md pages/_posts/*/*.md; do
            if [[ -f "$file" && "$file" != *"2000-01-01-index.md"* ]]; then
              # Extract date from filename (YYYY-MM-DD format)
              filename=$(basename "$file")
              if [[ $filename =~ ^([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
                file_date="${BASH_REMATCH[1]}"
                if [[ "$file_date" < "$cutoff_date" ]]; then
                  old_posts+=("$file")
                  archive_candidates="$archive_candidates
          - $file (dated: $file_date)"
                fi
              fi
            fi
          done
          
          echo "ARCHIVE_CANDIDATES<<EOF" >> $GITHUB_OUTPUT
          echo "$archive_candidates" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "OLD_POSTS_COUNT=${#old_posts[@]}" >> $GITHUB_OUTPUT
          
          if [[ ${#old_posts[@]} -gt 0 ]]; then
            echo "📁 Found ${#old_posts[@]} posts older than $cutoff_date for potential archiving"
          else
            echo "✅ No posts found older than $cutoff_date"
          fi

      - name: 'Run Actual Post Organization'
        id: organize
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          echo "🚀 Running actual post organization..."
          ./scripts/development/content/organize-posts.sh --auto-confirm 2>&1 | tee organize_output.log
          
          # Check if any files were moved
          if git diff --name-only | grep -q "pages/_posts"; then
            echo "CHANGES_MADE=true" >> $GITHUB_OUTPUT
            echo "✅ Post organization completed with changes"
          else
            echo "CHANGES_MADE=false" >> $GITHUB_OUTPUT
            echo "ℹ️  No changes needed - posts already organized"
          fi
          
          # Capture organize output for PR
          echo "ORGANIZE_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          cat organize_output.log >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 'Create Archive Directory Structure'
        if: ${{ steps.archive_check.outputs.OLD_POSTS_COUNT > 0 && github.event.inputs.dry_run != 'true' }}
        run: |
          echo "📦 Creating archive structure..."
          
          # Create archive directory with year-based structure
          current_year=$(date +%Y)
          mkdir -p "pages/_posts/archive/$current_year"
          
          echo "Created archive directory: pages/_posts/archive/$current_year"

      - name: 'Archive Old Posts'
        if: ${{ steps.archive_check.outputs.OLD_POSTS_COUNT > 0 && github.event.inputs.dry_run != 'true' }}
        env:
          ARCHIVE_THRESHOLD_MONTHS: ${{ github.event.inputs.archive_threshold_months || '3' }}
        run: |
          echo "📦 Archiving posts older than ${ARCHIVE_THRESHOLD_MONTHS} months..."

          cutoff_date=$(date -d "${ARCHIVE_THRESHOLD_MONTHS} months ago" +%Y-%m-%d)
          current_year=$(date +%Y)
          archived_count=0
          
          for file in pages/_posts/*.md pages/_posts/*/*.md; do
            if [[ -f "$file" && "$file" != *"2000-01-01-index.md"* ]]; then
              filename=$(basename "$file")
              if [[ $filename =~ ^([0-9]{4}-[0-9]{2}-[0-9]{2}) ]]; then
                file_date="${BASH_REMATCH[1]}"
                if [[ "$file_date" < "$cutoff_date" ]]; then
                  # Move to archive
                  archive_path="pages/_posts/archive/$current_year/$filename"
                  
                  echo "📦 Archiving: $file → $archive_path"
                  mv "$file" "$archive_path"
                  archived_count=$((archived_count + 1))
                fi
              fi
            fi
          done
          
          echo "ARCHIVED_COUNT=$archived_count" >> $GITHUB_OUTPUT
          echo "✅ Archived $archived_count posts to archive/$current_year/"

      - name: 'Generate Change Summary'
        id: summary
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          ARCHIVE_THRESHOLD_MONTHS: ${{ github.event.inputs.archive_threshold_months || '3' }}
          ARCHIVE_CANDIDATES: ${{ steps.archive_check.outputs.ARCHIVE_CANDIDATES }}
          ORGANIZE_OUTPUT: ${{ steps.organize.outputs.ORGANIZE_OUTPUT }}
          OLD_POSTS_COUNT: ${{ steps.archive_check.outputs.OLD_POSTS_COUNT || 0 }}
        run: |
          echo "📊 Generating change summary..."

          # Count changes
          organized_files=$(git diff --name-only | grep "pages/_posts" | grep -v "archive" | wc -l || echo "0")
          archived_files="$OLD_POSTS_COUNT"

          # Generate summary (untrusted values referenced via quoted shell vars)
          summary="## 📋 Weekly Post Organization Summary

          ### 📁 Post Organization
          - **Files organized**: $organized_files
          - **Files archived**: $archived_files
          - **Archive threshold**: ${ARCHIVE_THRESHOLD_MONTHS} months

          ### 🔍 Archive Candidates
          ${ARCHIVE_CANDIDATES}

          ### 📝 Organization Details
          \`\`\`
          ${ORGANIZE_OUTPUT}
          \`\`\`"

          echo "SUMMARY<<EOF" >> $GITHUB_OUTPUT
          echo "$summary" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 'Create Branch and Commit Changes'
        if: ${{ steps.organize.outputs.CHANGES_MADE == 'true' && github.event.inputs.dry_run != 'true' }}
        id: create_branch
        env:
          ARCHIVE_THRESHOLD_MONTHS: ${{ github.event.inputs.archive_threshold_months || '3' }}
        run: |
          # Create a new branch for the PR
          BRANCH_NAME="automated/organize-posts-${{ github.run_id }}"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_OUTPUT

          git checkout -b "$BRANCH_NAME"

          # Stage all changes in pages/_posts/
          git add pages/_posts/

          # Create commit message
          git commit -m "🤖 Weekly post organization and archiving

          - Organized posts into subdirectories by section
          - Archived posts older than ${ARCHIVE_THRESHOLD_MONTHS} months
          - Automated via GitHub Actions on ${{ github.run_id }}

          Generated by: ${{ github.workflow }} workflow"
          
          # Push the branch
          git push origin "$BRANCH_NAME"
          
          echo "✅ Branch created and pushed: $BRANCH_NAME"

      - name: 'Create Pull Request with GitHub CLI'
        if: ${{ steps.organize.outputs.CHANGES_MADE == 'true' && github.event.inputs.dry_run != 'true' }}
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create PR body
          cat > pr_body.md << 'EOF'
          ## 📋 Automated Post Organization
          
          This PR was automatically generated by the Weekly Post Organization workflow.
          
          ### 📊 Summary
          - **Workflow Run**: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Triggered**: ${{ github.event_name == 'schedule' && 'Scheduled (Weekly)' || 'Manual Dispatch' }}
          - **Archive Threshold**: ${{ github.event.inputs.archive_threshold_months || '3' }} months
          
          ### 📁 Changes Made
          ${{ steps.summary.outputs.SUMMARY }}
          
          ### ✅ Next Steps
          1. Review the organized file structure
          2. Verify posts are in correct subdirectories
          3. Merge this PR to apply changes
          
          ---
          *Generated by: ${{ github.workflow }} workflow*
          EOF
          
          # Create the PR using GitHub CLI
          PR_URL=$(gh pr create \
            --title "🤖 Weekly Post Organization - ${{ github.run_id }}" \
            --body-file pr_body.md \
            --base main \
            --head "${{ steps.create_branch.outputs.BRANCH_NAME }}" \
            --label "automated" \
            --label "content-organization" \
            --label "posts" \
            --assignee "bamr87")
          
          # Extract PR number from URL
          PR_NUMBER=$(echo "$PR_URL" | grep -oP '\d+$')
          
          echo "pull-request-url=$PR_URL" >> $GITHUB_OUTPUT
          echo "pull-request-number=$PR_NUMBER" >> $GITHUB_OUTPUT
          
          echo "✅ Pull Request created: $PR_URL"
          
          # Clean up
          rm pr_body.md

      - name: 'Workflow Summary'
        if: always()
        run: |
          echo "## 🎯 Weekly Post Organization Workflow Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Execution Mode**: ${{ github.event.inputs.dry_run == 'true' && 'Dry Run (Preview)' || 'Live Execution' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Archive Threshold**: ${{ github.event.inputs.archive_threshold_months || '3' }} months" >> $GITHUB_STEP_SUMMARY
          echo "**Posts for Archiving**: ${{ steps.archive_check.outputs.OLD_POSTS_COUNT }}" >> $GITHUB_STEP_SUMMARY
          echo "**Changes Made**: ${{ steps.organize.outputs.CHANGES_MADE }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "### 🔍 Dry Run Results" >> $GITHUB_STEP_SUMMARY
            echo "No changes were applied. Review the workflow logs for preview." >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ steps.organize.outputs.CHANGES_MADE }}" == "true" ]]; then
            echo "### ✅ Pull Request Created" >> $GITHUB_STEP_SUMMARY
            echo "Post organization completed. A pull request has been created with the proposed changes." >> $GITHUB_STEP_SUMMARY
            if [[ -n "${{ steps.create_pr.outputs.pull-request-number }}" ]]; then
              echo "**PR Number**: #${{ steps.create_pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
              echo "**PR URL**: ${{ steps.create_pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "### ℹ️ No Changes Needed" >> $GITHUB_STEP_SUMMARY
            echo "Posts are already organized. No pull request was created." >> $GITHUB_STEP_SUMMARY
          fi
