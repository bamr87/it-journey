version: 2
updates:
  # Keep GitHub Actions current — actions float on their major tag (@v4), so
  # Dependabot opens a PR when a new major version is published.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Ruby gem updates (github-pages, jekyll plugins).
  - package-ecosystem: bundler
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
