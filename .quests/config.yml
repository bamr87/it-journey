# =============================================================================
# .quests/config.yml — Autonomous quest-perfection loop policy
# -----------------------------------------------------------------------------
# The single hand-edited knob-board for the quest-perfection loop, mirroring
# .cms/config.yml and .issues/config.yml. The deterministic ledger
# (scripts/quest/ledger.py) reads this to decide (1) what "perfect" MEANS, (2)
# which not-yet-perfect (character, level) slice to walk/fix next, and (3) when a
# repeatedly-fixed slice is declared stuck. The walk + fix agents ACT on the
# ledger's decisions; they never re-decide policy. Edit this file to tune the
# bar — not the Python.
#
# A SLICE is "<character.key>/<level.code>" e.g. "developer/0001". This is the
# stable key everywhere; NEVER the permalink. Character keys: developer,
# system-engineer, security-specialist, data-scientist, digital-artist,
# game-developer. level.code is a 4-bit string like 0001.
#
# HARD GUARDRAILS (enforced in scripts/quest/ledger.py, not knobs):
#   * "perfect" REQUIRES mode == execute AND a non-truncated, fully-scored run
#     (M7). review-mode or truncated runs can NEVER certify perfect, regardless
#     of the numbers below.
#   * result.verdict_obj.executed is MODEL-SUPPLIED, so even an execute-mode,
#     non-truncated pass does NOT authorize full hands-off auto-merge of fixes:
#     fix PRs stay gated on CONTENT_AUTOMERGE_ENABLED until a harness-stamped
#     execution proof exists. These knobs gate CERTIFICATION, not merge.
# =============================================================================

# -----------------------------------------------------------------------------
# perfect — the certification bar. A slice is "perfect" only when EVERY one of
# these holds for its most-recent walk evidence (and the M7 honest-run gate, in
# code, is satisfied). All-or-nothing.
# -----------------------------------------------------------------------------
perfect:
  require_mode: execute        # only execute-mode runs can certify (M7)
  require_executed: true       # verdict_obj.executed must be true (model-supplied; see header)
  t1_bar: 70                   # tier-1 structural score (quest_validator.py) must be >= this
  t2_pass: 80                  # tier-2 agentic per-quest pass score must be >= this
  average_min: 95              # run-level average score must be >= this
  max_warn: 0                  # zero quests may verdict "warn"
  max_fail: 0                  # zero quests may verdict "fail"
  max_errored: 0               # zero quests may error out during the run
  max_open_issues: 0           # zero open recommendations/issues remaining
  max_high_priority: 0         # zero high-priority recommendations remaining
  forbid_truncated: true       # a truncated run can never be perfect (M7)

# -----------------------------------------------------------------------------
# history — per-slice append-only event log retention.
# -----------------------------------------------------------------------------
history:
  cap: 10                      # keep the last N events per slice (walk + fix)

# -----------------------------------------------------------------------------
# selection — how `ledger.py select` chooses the next slice to work.
# -----------------------------------------------------------------------------
selection:
  strategy: priority           # worst/oldest not-perfect slice first
  skip_perfect_within_days: 7  # don't re-walk a slice certified perfect in the last N days
  rewalk_failing: true         # always re-walk slices that are failing/open

# -----------------------------------------------------------------------------
# fix — the write/fix lane (circuit breaker, M6).
# -----------------------------------------------------------------------------
fix:
  max_fix_rounds: 3            # after N fix rounds without becoming perfect, mark stuck/needs_human
