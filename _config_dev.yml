# Dev config override — merged after _config.yml:
#   bundle exec jekyll serve --config _config.yml,_config_dev.yml
#
# Note: Jekyll skips nil values when merging, so use "" (not null) to clear remote_theme.

remote_theme             : ""
theme                    : "jekyll-theme-zer0"

# Allow future-dated posts to be rendered in development
future: true

# Performance: enable incremental builds for development
incremental: true

# Performance: limit post processing (only N most recent - major speedup for large sites)
# Must exceed index pages (pages/_posts/**/2000-01-01-index.md) + recent chronicles or /news/ 404s locally
limit_posts: 120

# Performance: disable LSI (latent semantic indexing) - expensive computation
lsi: false

# Performance: don't process drafts unless explicitly needed
show_drafts: false

# Performance: disable feed/sitemap regeneration during dev
# These plugins regenerate fully on every change, adding ~10-20s
plugins:
  - jekyll-include-cache
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-paginate

# Performance: skip preview-image scan and FrontMatter preview mirror during dev
preview_images:
  enabled: false

preview_generator:
  enabled: false

# Performance: reduce Liquid processing overhead
liquid:
  error_mode: warn
  strict_filters: false

# Uncomment to print a per-template build profile report for diagnosing slow templates
# profile: true
