# Dev config override — merged after _config.yml:
#   bundle exec jekyll serve --config _config.yml,_config_dev.yml
#
# Note: Jekyll skips nil values when merging, so use "" (not null) to clear remote_theme.

remote_theme             : ""
theme                    : "jekyll-theme-zer0"

# Allow future-dated posts to be rendered in development
future: true

# Performance: enable incremental builds for development
incremental: true

# Performance: limit post processing (only N most recent - major speedup for large sites)
# Must exceed category index pages (2000-01-01-index.md) + recent chronicles to avoid /news/ 404s locally.
# Raise to 120+ when editing older posts; 30 is safe for most day-to-day dev work.
limit_posts: 30

# Performance: disable LSI (latent semantic indexing) - expensive computation
lsi: false

# Performance: don't process drafts unless explicitly needed
show_drafts: false

# Performance: disable feed/sitemap regeneration during dev
# These plugins regenerate fully on every change, adding ~10-20s
plugins:
  - jekyll-include-cache
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-paginate

# Performance: skip preview-image scan and FrontMatter preview mirror during dev
preview_images:
  enabled: false

preview_generator:
  enabled: false

# Performance: skip full-site filesystem scan for statistics on every build.
# The generator reads and YAML-parses 600+ files on every run regardless of
# incremental mode. Re-enable to refresh _data/content_statistics.yml manually.
content_statistics:
  auto_generate: false

# Performance: reduce Liquid processing overhead
liquid:
  error_mode: warn
  strict_filters: false

# Performance: disable rarely-edited collections during development.
# Jekyll deep-merges this over _config.yml, so only the specified keys are overridden.
# Comment out or set output: true for any collection you're actively editing.
# quests and notebooks are the heaviest collections (~200+ docs each).
# Set output: true for any collection you need to work on locally.
collections:
  quests:
    output: false
  docs:
    output: false  # 240 files, 220 are wargames — disable unless actively editing docs
  notebooks:
    output: false
  hobbies:
    output: false

# Uncomment to print a per-template build profile report for diagnosing slow templates
# profile: true
