# Dev config override

remote_theme             : "bamr87/zer0-mistakes"
# theme                  : "jekyll-theme-zer0"

# Performance: enable incremental builds for development
incremental: true

# Performance: limit post processing (only N most recent - major speedup for large sites)
# With 88+ posts, this alone can cut build time by 50%+
limit_posts: 30

# Performance: disable LSI (latent semantic indexing) - expensive computation
lsi: false

# Performance: don't process drafts unless explicitly needed
show_drafts: false

# Performance: disable feed/sitemap regeneration during dev
# These plugins regenerate fully on every change, adding ~10-20s
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-relative-links
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-paginate

# Performance: reduce Liquid processing overhead
liquid:
  error_mode: warn
  strict_filters: false

# Uncomment to print a per-template build profile report for diagnosing slow templates
# profile: true