# IT-Journey — brand colors (machine-readable core)
#
# The canonical color palette. Mirrors `theme_color` in _config.yml verbatim so
# there is one source authors and the brand-voice skill can name. Rendering CSS
# (RPG tier/class tokens) lives in assets/css/quest-system.css and
# assets/css/contributor-profile.css — referenced here, NOT copied.
# Consumed as site.data.brand.colors.*.

theme_skin: dark

# Palette tokens (name -> hex). Identical to _config.yml > theme_color.
palette:
  main: "#007bff"
  secondary: "#6c757d"
  red: "#a11111"
  yellow: "#ffe900"
  teal: "#376986"
  blue: "#007bff"
  green: "#28a745"
  purple: "#6f42c1"
  pink: "#e83e8c"
  orange: "#fd7e14"
  brown: "#795548"
  cyan: "#17a2b8"
  indigo: "#6610f2"
  lime: "#cddc39"
  amber: "#ffc107"
  deep_orange: "#ff5722"
  deep_purple: "#673ab7"
  light_blue: "#03a9f4"
  light_green: "#8bc34a"
  light_purple: "#9c27b0"
  light_red: "#f44336"
  light_yellow: "#ffeb3b"
  light_teal: "#009688"

# Per-section accent: palette token + Bootstrap icon (no bi- prefix). Icons match
# the canonical category map in .github/instructions/index-hub.instructions.md §4
# and sections/_registry.yml (keep the three in sync — the registry is the source).
section_accent:
  ai-machine-learning:   { token: cyan,        icon: robot }
  business:              { token: secondary,   icon: briefcase }
  creative-experimental: { token: pink,        icon: palette }
  culture-society:       { token: deep_purple, icon: people }
  data-analytics:        { token: amber,       icon: bar-chart }
  devops:                { token: teal,        icon: gear }
  learning:              { token: green,       icon: book }
  programming:           { token: indigo,      icon: code-slash }
  system-administration: { token: brown,       icon: server }
  technology:            { token: blue,        icon: cpu }
  tools-environment:     { token: orange,      icon: tools }
  trends-ideas:          { token: yellow,      icon: lightbulb }
  web-development:       { token: light_blue,  icon: globe }

# Pointers to the rendering CSS (do not duplicate token values here).
css_references:
  quest_tiers: assets/css/quest-system.css      # --quest-tier-* / --quest-difficulty-*
  contributor_classes: assets/css/contributor-profile.css  # --contributor-* / .contributor-card--*
