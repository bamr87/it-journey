# IT-Journey — section guide registry (machine-readable core)
#
# Maps a section slug to its display facts + the voice profile and personas that
# govern it. This is the SOURCE for the category map; the table in
# .github/instructions/index-hub.instructions.md §4 and _data/navigation/posts.yml
# mirror it (keep them in sync). cms.py (_check_brand) and the brand-voice skill
# resolve a post -> section -> profile through this file.
#
# slug = the pages/_posts/<slug>/ folder name (so posts resolve by folder for free).
# voice_profile must be a key in ../voice.yml > profiles.
# personas are ids in ../personas.yml.
# icon = Bootstrap Icons name (no bi- prefix); accent = token in ../colors.yml.
# guide = the narrative file in this directory.

sections:
  ai-machine-learning:
    title: AI & Machine Learning
    permalink: /news/ai-machine-learning/
    voice_profile: practitioner-chronicle
    personas: [practitioner, ai-enthusiast]
    icon: robot
    accent: cyan
    guide: ai-machine-learning.md
  business:
    title: Business
    permalink: /news/business/
    voice_profile: concept-essay
    personas: [practitioner, educator]
    icon: briefcase
