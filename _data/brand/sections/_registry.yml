  # Format overlay, not a folder. "Muses" are short-form opinion/news posts that
  # live in pages/_posts/devops/ but are written in the muse-opinion voice and
  # surfaced on the magazine landing. A post opts in via section_guide: devops-news-muse.
  devops-news-muse:
