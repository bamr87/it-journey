# Contributor Profile Template
# ============================
# Copy this file to _data/contributors/<your-github-username>.yml
# and fill in the `profile` section with your information.
#
# The `stats`, `achievements`, and `level` sections are auto-generated
# by the contributor stats pipeline. Do not edit them manually.

profile:
  display_name: "Your Display Name"
  avatar: ""  # Path to avatar image, or leave blank for GitHub avatar fallback
  class: Warrior  # Choose: Wizard, Warrior, Ranger, Healer, Rogue, Bard
  title: "Your Title or Role"
  bio: >-
    A short bio about yourself and your interests.
  location: ""
  motto: ""
  banner_color: ""  # Hex color for profile banner (optional, class default used if blank)
  links:
    github: ""       # GitHub username (required)
    twitter: ""      # Twitter/X handle (optional)
    linkedin: ""     # LinkedIn username (optional)
    website: ""      # Personal website URL (optional)
  badges_pinned: []  # Pin up to 5 achievement IDs to display prominently

# === AUTO-GENERATED BELOW THIS LINE ===
# Do not edit manually — regenerated by scripts/generation/generate_contributor_stats.rb

stats:
  total_commits: 0
  total_prs_merged: 0
  total_quests_authored: 0
  total_posts_authored: 0
  lines_added: 0
  lines_removed: 0
  first_contribution_date: null
  latest_contribution_date: null
  active_days: 0
  streak_days: 0
  top_languages: []
  top_categories: []
  contribution_calendar: []

achievements: []

level:
  xp: 0
  current_level: "0000"
  tier: "Apprentice"
  xp_to_next_level: 100
  progress_percent: 0
